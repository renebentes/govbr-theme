name: govbr-devcontainer

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../..:/workspaces:cached
    environment:
      JOOMLA_DB_USER: joomla
      JOOMLA_DB_PASSWORD: joomla
      JOOMLA_DB_NAME: joomladb
      JOOMLA_SITE_NAME: "GovBR Demo Site"
      JOOMLA_ADMIN_USER: Administrator
      JOOMLA_ADMIN_USERNAME: joomladmin
      JOOMLA_ADMIN_PASSWORD: govbr-01012026
      JOOMLA_ADMIN_EMAIL: demo@joomla.org
    network_mode: service:db

  db:
    image: mariadb:10.6
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped
    volumes:
      - mariadb-data:/var/lib/mysql
    environment:
      MARIADB_ROOT_PASSWORD: joomla
      MARIADB_DATABASE: joomladb
      MARIADB_USER: joomla
      MARIADB_PASSWORD: joomla

  adminer:
    image: adminer:5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    ports:
      - "8090:8080"
    depends_on:
      - db
    environment:
      ADMINER_DEFAULT_SERVER: db

volumes:
  mariadb-data:
